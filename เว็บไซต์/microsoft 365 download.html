<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft 365 ProPlus Retail Downloads</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0078d4;
            --primary-hover: #005a9e;
            --bg-gradient: linear-gradient(135deg, #f3f2f1 0%, #e1dfdd 100%);
            --card-bg: #ffffff;
            --text-main: #323130;
            --text-muted: #605e5c;
            --border-color: #edebe9;
        }

        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-section i {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        h1 {
            color: var(--text-main);
            margin: 0;
            font-weight: 600;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        .search-container {
            position: relative;
            margin-bottom: 25px;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px 14px 50px;
            box-sizing: border-box;
            border: 2px solid var(--border-color);
            border-radius: 30px;
            font-size: 16px;
            font-family: 'Sarabun', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            background-color: #faf9f8;
        }

        #searchInput:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 120, 212, 0.1);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            max-height: 60vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }

        th {
            background-color: #f8f8f8;
            color: var(--text-muted);
            font-weight: 600;
            text-align: left;
            padding: 18px 20px;
            border-bottom: 2px solid var(--border-color);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 15px;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f3f9fd;
        }

        .lang-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-name {
            font-weight: 600;
            color: var(--text-main);
        }

        .badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            background: #e1dfdd;
            color: #484644;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            min-width: 110px;
        }

        .btn-online {
            background-color: #e1f0fe;
            color: var(--primary-color);
        }

        .btn-online:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 120, 212, 0.2);
        }

        .btn-offline {
            background-color: #f3f2f1;
            color: var(--text-main);
            border: 1px solid #d2d0ce;
        }

        .btn-offline:hover {
            background-color: var(--text-main);
            color: white;
            border-color: var(--text-main);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        /* สำหรับหน้าจอมือถือ */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .container { padding: 20px; }
            h1 { font-size: 22px; }
            th, td { padding: 12px 15px; }
            .btn { min-width: auto; padding: 6px 12px; font-size: 13px; }
            .btn i { display: none; /* ซ่อนไอคอนบนมือถือเพื่อประหยัดพื้นที่ */ }
            .lang-wrapper { flex-direction: column; align-items: flex-start; gap: 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <i class="fab fa-microsoft"></i>
        <h1>Microsoft 365 ProPlus Retail</h1>
    </div>
    
    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="ค้นหาภาษา เช่น Thai, English, zh-CN...">
    </div>

    <div class="table-wrapper">
        <table id="downloadTable">
            <thead>
                <tr>
                    <th>ภาษา (Language)</th>
                    <th>Online x64</th>
                    <th>Online x32</th>
                    <th>Offline (IMG)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- ข้อมูลจะถูกดึงมาแสดงด้วย JavaScript -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const data = [
        ["English [en-US]", "en-us"], ["Thai [th-TH]", "th-th"], ["Chinese (Simplified) [zh-CN]", "zh-cn"],
        ["Chinese (Taiwan) [zh-TW]", "zh-tw"], ["Japanese [ja-JP]", "ja-jp"], ["Korean [ko-KR]", "ko-kr"],
        ["Arabic [ar-SA]", "ar-sa"], ["Bulgarian [bg-BG]", "bg-bg"], ["Czech [cs-CZ]", "cs-cz"],
        ["Danish [da-DK]", "da-dk"], ["German [de-DE]", "de-de"], ["Greek [el-GR]", "el-gr"],
        ["Spanish [es-ES]", "es-es"], ["Estonian [et-EE]", "et-ee"], ["Finnish [fi-FI]", "fi-fi"],
        ["French [fr-FR]", "fr-fr"], ["Hebrew [he-IL]", "he-il"], ["Hindi [hi-IN]", "hi-in"],
        ["Croatian [hr-HR]", "hr-hr"], ["Hungarian [hu-HU]", "hu-hu"], ["Indonesian [id-ID]", "id-id"],
        ["Italian [it-IT]", "it-it"], ["Kazakh [kk-KZ]", "kk-kz"], ["Lithuanian [lt-LT]", "lt-lt"],
        ["Latvian [lv-LV]", "lv-lv"], ["Malay [ms-MY]", "ms-my"], ["Dutch [nl-NL]", "nl-nl"],
        ["Norwegian [nb-NO]", "nb-no"], ["Polish [pl-PL]", "pl-pl"], ["Portuguese (Brazil) [pt-BR]", "pt-br"],
        ["Portuguese (Portugal) [pt-PT]", "pt-pt"], ["Romanian [ro-RO]", "ro-ro"], ["Russian [ru-RU]", "ru-ru"],
        ["Slovak [sk-SK]", "sk-sk"], ["Slovenian [sl-SI]", "sl-si"], ["Serbian (Latin) [sr-latn-rs]", "sr-latn-rs"],
        ["Swedish [sv-SE]", "sv-se"], ["Turkish [tr-TR]", "tr-tr"], ["Ukrainian [uk-UA]", "uk-ua"], ["Vietnamese [vi-VN]", "vi-vn"]
    ];

    const tableBody = document.getElementById('tableBody');

    data.forEach(item => {
        const row = document.createElement('tr');
        const rawName = item[0];
        const langCode = item[1];
        
        // แยกชื่อภาษา กับ รหัสภาษา ออกจากกัน (เพื่อดีไซน์ที่สวยงามขึ้น)
        const namePart = rawName.split(' [')[0];
        const codePart = rawName.split(' [')[1].replace(']', '');
        
        row.innerHTML = `
            <td>
                <div class="lang-wrapper">
                    <span class="lang-name">${namePart}</span>
                    <span class="badge">${codePart}</span>
                </div>
            </td>
            <td><a href="https://c2rsetup.officeapps.live.com/c2r/download.aspx?ProductreleaseID=O365ProPlusRetail&platform=x64&language=${langCode}&version=O16GA" class="btn btn-online" target="_blank"><i class="fas fa-cloud-download-alt"></i> x64</a></td>
            <td><a href="https://c2rsetup.officeapps.live.com/c2r/download.aspx?ProductreleaseID=O365ProPlusRetail&platform=x86&language=${langCode}&version=O16GA" class="btn btn-online" target="_blank"><i class="fas fa-cloud-download-alt"></i> x32</a></td>
            <td><a href="https://officecdn.microsoft.com/db/492350f6-3a01-4f97-b9c0-c7c6ddf67d60/media/${langCode}/O365ProPlusRetail.img" class="btn btn-offline" target="_blank"><i class="fas fa-compact-disc"></i> IMG File</a></td>
        `;
        tableBody.appendChild(row);
    });

    function searchTable() {
        let input = document.getElementById("searchInput");
        let filter = input.value.toUpperCase();
        let table = document.getElementById("downloadTable");
        let tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) { // เริ่มที่ 1 เพื่อข้าม Header
            let td = tr[i].getElementsByTagName("td")[0];
            if (td) {
                let txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }
</script>

</body>
</html>
