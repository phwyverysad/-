<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - ฝากไฟล์ & แชร์ด้วยคิวอาร์โค้ด</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; }
        .dragover { 
            border-color: #8b5cf6 !important; 
            background-color: #f5f3ff !important; 
            transform: scale(1.02);
        }
        /* ซ่อน scrollbar สำหรับชื่อไฟล์ยาวๆ */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        #qrcode img {
            margin: auto;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-100 via-indigo-50 to-purple-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/90 backdrop-blur-xl rounded-[2rem] shadow-2xl p-8 w-full max-w-md transition-all duration-300">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl mb-4 shadow-lg shadow-indigo-200 text-white transform -rotate-6 hover:rotate-0 transition duration-300">
                <i class="fa-solid fa-cloud-arrow-up text-3xl"></i>
            </div>
            <h1 class="text-2xl font-semibold text-gray-800">อัปโหลด & แชร์ไฟล์</h1>
            <p class="text-gray-500 text-sm mt-1">อัปโหลดไฟล์ฟรี พร้อมรับ Link และ QR Code</p>
        </div>

        <!-- Drop Zone -->
        <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center transition-all duration-300 hover:border-purple-400 hover:bg-purple-50 cursor-pointer mb-6 group">
            <input type="file" id="file-input" class="hidden">
            <div class="bg-gray-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-purple-100 transition">
                <i class="fa-solid fa-folder-open text-2xl text-gray-400 group-hover:text-purple-500 transition"></i>
            </div>
            <p class="text-gray-700 font-medium">คลิกเลือกไฟล์ หรือลากมาวาง</p>
            <p class="text-gray-400 text-xs mt-2">ไม่จำกัดขนาด รองรับทุกนามสกุลไฟล์</p>
        </div>

        <!-- File Info (Hidden) -->
        <div id="file-info" class="hidden bg-gray-50 p-4 rounded-xl flex items-center justify-between mb-6 border border-gray-200 shadow-sm">
            <div class="flex items-center overflow-hidden w-full pr-4">
                <div class="bg-indigo-100 p-2 rounded-lg mr-3 text-indigo-500 shrink-0">
                    <i class="fa-solid fa-file-lines text-lg"></i>
                </div>
                <div class="overflow-hidden w-full">
                    <p id="file-name" class="text-sm font-medium text-gray-800 truncate"></p>
                    <p id="file-size" class="text-xs text-gray-500 mt-0.5"></p>
                </div>
            </div>
            <button id="remove-file" class="text-gray-400 hover:text-red-500 transition-colors shrink-0 bg-white rounded-full w-8 h-8 flex items-center justify-center shadow-sm border border-gray-100">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden text-red-500 text-sm text-center mb-4 bg-red-50 p-3 rounded-xl border border-red-100"></div>

        <!-- Upload Button -->
        <button id="upload-btn" disabled class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-medium py-3.5 px-4 rounded-xl transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed shadow-md shadow-indigo-200 flex items-center justify-center space-x-2">
            <i class="fa-solid fa-paper-plane"></i>
            <span>เริ่มอัปโหลดไฟล์</span>
        </button>

        <!-- Progress Area (Hidden) -->
        <div id="progress-area" class="hidden mt-4">
            <div class="flex justify-between text-sm font-medium text-gray-700 mb-2">
                <span id="progress-text" class="flex items-center">
                    <i class="fa-solid fa-circle-notch fa-spin text-indigo-500 mr-2"></i>กำลังอัปโหลด...
                </span>
                <span id="progress-percent" class="text-indigo-600">0%</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden shadow-inner">
                <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full rounded-full transition-all duration-300 relative" style="width: 0%">
                    <div class="absolute inset-0 bg-white/20 animate-pulse"></div>
                </div>
            </div>
        </div>

        <!-- Result Area (Hidden) -->
        <div id="result-area" class="hidden mt-6 animate-fade-in">
            <div class="bg-green-50 border border-green-200 text-green-700 p-3 rounded-xl flex items-center justify-center mb-6">
                <i class="fa-solid fa-circle-check text-xl mr-2"></i>
                <span class="font-medium text-sm">อัปโหลดไฟล์สำเร็จ!</span>
            </div>

            <!-- QR Code Box -->
            <div class="bg-gray-50 border border-gray-200 p-5 rounded-2xl flex flex-col items-center justify-center mb-5">
                <p class="text-xs text-gray-500 font-medium mb-3">สแกนเพื่อดาวน์โหลด</p>
                <div id="qrcode" class="bg-white p-2 rounded-xl shadow-sm border border-gray-100"></div>
            </div>

            <!-- Link Box -->
            <label class="text-xs font-medium text-gray-500 ml-1 mb-1 block">ลิ้งก์ดาวน์โหลด</label>
            <div class="flex items-center space-x-2 mb-6">
                <input type="text" id="result-link" readonly class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent block p-3 outline-none transition">
                <button id="copy-btn" class="bg-gray-800 hover:bg-black text-white p-3 rounded-xl transition duration-200 shrink-0 w-12 flex justify-center items-center shadow-md" title="คัดลอกลิ้งก์">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>

            <button id="reset-btn" class="w-full bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-medium py-3 px-4 rounded-xl transition duration-300 flex items-center justify-center">
                <i class="fa-solid fa-rotate-right mr-2"></i> อัปโหลดไฟล์อื่นเพิ่มเติม
            </button>
        </div>

    </div>

    <script>
        // Elements
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const fileName = document.getElementById('file-name');
        const fileSize = document.getElementById('file-size');
        const removeFileBtn = document.getElementById('remove-file');
        const uploadBtn = document.getElementById('upload-btn');
        const progressArea = document.getElementById('progress-area');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const progressText = document.getElementById('progress-text');
        const resultArea = document.getElementById('result-area');
        const resultLink = document.getElementById('result-link');
        const copyBtn = document.getElementById('copy-btn');
        const resetBtn = document.getElementById('reset-btn');
        const errorMessage = document.getElementById('error-message');
        const qrcodeContainer = document.getElementById('qrcode');

        let selectedFile = null;
        let qrCodeObj = null;

        // Utility: Format File Size
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // Handle Error Display
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        // File Selection Logic
        function handleFile(file) {
            if (!file) return;
            selectedFile = file;
            
            hideError();
            dropZone.classList.add('hidden');
            fileInfo.classList.remove('hidden');
            fileName.textContent = file.name;
            fileSize.textContent = formatBytes(file.size);
            uploadBtn.removeAttribute('disabled');
        }

        // Event Listeners for file input
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // Remove File
        removeFileBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.add('hidden');
            dropZone.classList.remove('hidden');
            uploadBtn.setAttribute('disabled', 'true');
        });

        // Upload Process
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // UI Adjustments
            uploadBtn.classList.add('hidden');
            removeFileBtn.classList.add('hidden');
            progressArea.classList.remove('hidden');
            hideError();

            try {
                // 1. Get Gofile Server
                progressText.innerHTML = '<i class="fa-solid fa-server fa-spin text-indigo-500 mr-2"></i>หาเซิร์ฟเวอร์...';
                const serverRes = await fetch('https://api.gofile.io/servers', { method: 'GET' });
                const serverData = await serverRes.json();
                
                if (serverData.status !== 'ok') {
                    throw new Error("ไม่สามารถเชื่อมต่อ Gofile Server ได้");
                }
                const server = serverData.data.servers[0].name;

                // 2. Upload File via XHR for progress tracking
                progressText.innerHTML = '<i class="fa-solid fa-cloud-arrow-up animate-bounce text-indigo-500 mr-2"></i>กำลังอัปโหลด...';
                
                const formData = new FormData();
                formData.append('file', selectedFile);

                const xhr = new XMLHttpRequest();
                
                // Track Progress
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        progressBar.style.width = percentComplete + '%';
                        progressPercent.textContent = percentComplete + '%';
                    }
                });

                // Complete/Error Handlers
                xhr.addEventListener('load', () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        const response = JSON.parse(xhr.responseText);
                        if (response.status === 'ok') {
                            showSuccess(response.data.downloadPage);
                        } else {
                            throw new Error(response.error || "เกิดข้อผิดพลาดในการอัปโหลด");
                        }
                    } else {
                        handleUploadError("เซิร์ฟเวอร์ไม่ตอบสนอง");
                    }
                });

                xhr.addEventListener('error', () => {
                    handleUploadError("การเชื่อมต่อล้มเหลว");
                });

                // Send
                xhr.open('POST', `https://${server}.gofile.io/contents/uploadfile`);
                xhr.send(formData);

            } catch (error) {
                handleUploadError(error.message);
            }
        });

        // Success State
        function showSuccess(link) {
            progressArea.classList.add('hidden');
            resultArea.classList.remove('hidden');
            resultLink.value = link;
            
            // Generate QR Code
            qrcodeContainer.innerHTML = ""; // Clear old QR code
            qrCodeObj = new QRCode(qrcodeContainer, {
                text: link,
                width: 150,
                height: 150,
                colorDark : "#1f2937",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // Error State during upload
        function handleUploadError(msg) {
            showError(msg);
            uploadBtn.classList.remove('hidden');
            removeFileBtn.classList.remove('hidden');
            progressArea.classList.add('hidden');
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';
        }

        // Copy Link
        copyBtn.addEventListener('click', () => {
            resultLink.select();
            document.execCommand('copy');
            
            const icon = copyBtn.querySelector('i');
            icon.className = 'fa-solid fa-check';
            copyBtn.classList.add('bg-green-600');
            copyBtn.classList.remove('bg-gray-800');
            
            setTimeout(() => {
                icon.className = 'fa-regular fa-copy';
                copyBtn.classList.remove('bg-green-600');
                copyBtn.classList.add('bg-gray-800');
            }, 2000);
        });

        // Reset App
        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            
            resultArea.classList.add('hidden');
            fileInfo.classList.add('hidden');
            dropZone.classList.remove('hidden');
            
            uploadBtn.classList.remove('hidden');
            uploadBtn.setAttribute('disabled', 'true');
            removeFileBtn.classList.remove('hidden');
            
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';
            qrcodeContainer.innerHTML = "";
        });
    </script>
</body>
</html>
